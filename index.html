function unlock(){
  var pw=document.getElementById("pw-input").value;
  if(!pw)return;
  var btn=document.getElementById("submit-btn");
  btn.textContent="验证中...";btn.disabled=true;
  setTimeout(function(){
    try{
      var dec=CryptoJS.AES.decrypt(ENC,pw);
      var html=dec.toString(CryptoJS.enc.Utf8);
      if(!html||html.length<500)throw new Error("fail");
      document.getElementById("auth-page").style.display="none";
      var frame=document.getElementById("chart-frame");
      frame.style.display="block";
      frame.srcdoc=html;
      document.body.style.overflow="auto";
      sessionStorage.setItem("_wp",pw);
    }catch(e){
      document.getElementById("err-msg").style.display="block";
      document.getElementById("pw-input").value="";
      document.getElementById("pw-input").focus();
      btn.textContent="确认";btn.disabled=false;
    }
  },50);
}
document.getElementById("submit-btn").addEventListener("click",unlock);
document.getElementById("pw-input").addEventListener("keypress",function(e){if(e.key==="Enter")unlock();});
window.addEventListener("DOMContentLoaded",function(){
  var sp=sessionStorage.getItem("_wp");
  if(sp){document.getElementById("pw-input").value=sp;unlock();}
  else{document.getElementById("pw-input").focus();}
});
</script>
